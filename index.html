<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE RANK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>CODE RANK</h1>
        <div class="user-container">
            <p>Enter Your LeetCode Username Below:</p>
            <div class="user-input-container">
                <input type="text" placeholder="Enter your username" id="user-input">
                <button id="search-btn">Search</button>
            </div>
        </div>
        <div class="stats-container">
            <div class="progress">
  <div class="ring-item">
    <svg width="140" height="140" viewBox="0 0 140 140" class="ring-svg" data-level="easy"></svg>
    <div class="ring-label easy-label">Easy</div>
    <div class="ring-sub" id="easy-total">/ - total</div>
  </div>
  <div class="ring-item">
    <svg width="140" height="140" viewBox="0 0 140 140" class="ring-svg" data-level="medium"></svg>
    <div class="ring-label medium-label">Medium</div>
    <div class="ring-sub" id="medium-total">/ - total</div>
  </div>
  <div class="ring-item">
    <svg width="140" height="140" viewBox="0 0 140 140" class="ring-svg" data-level="hard"></svg>
    <div class="ring-label hard-label">Hard</div>
    <div class="ring-sub" id="hard-total">/ - total</div>
  </div>
</div>
            <div class="stat-card">
                <!-- Directly Populate card here from the JS Code -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="city.js"></script>
</body>
</html>
