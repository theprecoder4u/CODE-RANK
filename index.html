<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE RANK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    
    <div class="container">
        <!-- heading
        user
        stats -->
        <h1>CODE RANK</h1>
        <div class="user-container">
            <p>Enter your LeetCode username below:</p>
            <div class="user-input-container">
                <input type="text" placeholder="Enter your username here" id="user-input">
                <button id="search-btn">Search</button>
            </div>
            <p class="follow-text">Follow for Source Code</p>
            <div class="social-icons">
                  <a href="https://www.linkedin.com/in/preepat/" target="_blank">
        <i class="fab fa-linkedin"></i>
    </a>

    <a href="https://www.instagram.com/oo7aj_2" target="_blank">
        <i class="fab fa-instagram"></i>
    </a>
                </div>
        </div>

        <div class="stats-container hidden">
            
            <div class="progress">

                <div class="progress-item">
                    <div class="easy-progress circle">
                        <span id="easy-label"></span>
                        <p>Easy</p>
                    </div>
                </div>

                <div class="progress-item ">
                    <div class="medium-progress circle">
                        <span id="medium-label"></span>
                        <p>Medium</p>
                    </div>
                </div>

                <div class="progress-item ">
                    <div class="hard-progress circle">
                        <span id="hard-label"></span>
                        <p>Hard</p>
                    </div>
                </div>

            </div>

            <div class="stats-cards">
                <!-- directly populate card here from the JS code -->
            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
